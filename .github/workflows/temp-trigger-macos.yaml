# 临时触发文件:本机无 gh/API token,借 push 事件启动 macOS x86_64+aarch64 构建。
# universal 已多次验证成功,此处只跑两个单架构。验证通过合入 main 后请删除本文件。
name: Temp Trigger macOS Build
on:
  push:
    branches: [fix/windows-runner-vs2022]

jobs:
  x86:
    uses: ./.github/workflows/macos.yaml
    with:
      repo: PonyNotes-IO/PonyNotes-New
      branch: dev_mobile
      build_name: "1.0.5"
      arch: "x86_64"
      internal_build: "1"
    secrets: inherit
  arm64:
    uses: ./.github/workflows/macos.yaml
    with:
      repo: PonyNotes-IO/PonyNotes-New
      branch: dev_mobile
      build_name: "1.0.5"
      arch: "aarch64"
      internal_build: "1"
    secrets: inherit
