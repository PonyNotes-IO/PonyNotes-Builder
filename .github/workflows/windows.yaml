name: Build PonyNotes Windows

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repo"
        required: true
        default: "PonyNotes-IO/PonyNotes-New"
      branch:
        description: "Branch"
        required: true
        default: "dev_mobile"
      build_name:
        description: "Build Version (it should match the version in pubspec.yaml)"
        required: true
        default: "1.0.5"
      internal_build:
        type: choice
        description: "Internal Build Type (1 for internal, 0 for external)"
        required: true
        default: "1"
        options:
          - "0"
          - "1"
  workflow_call:
    inputs:
      repo:
        description: "Repo"
        required: true
        type: string
      branch:
        description: "Branch"
        required: true
        type: string
      build_name:
        description: "Build Version"
        required: true
        type: string
      internal_build:
        description: "Internal Build Type"
        required: true
        type: string
      upload_url:
        description: "Upload URL for release assets"
        required: false
        type: string

env:
  FLUTTER_VERSION: "3.35.1"  # Windows 官方清单无 3.35.0(仅 macOS/Linux 发布),用同系列 3.35.1
  RUST_TOOLCHAIN: "1.91.0"

jobs:
  build:
    env:
      WINDOWS_APP_RELEASE_PATH: frontend\appflowy_flutter\product\${{ inputs.build_name }}\windows
      WINDOWS_ZIP_NAME: PonyNotes-${{ inputs.build_name }}-windows-x86_64.zip
      WINDOWS_INSTALLER_NAME: PonyNotes-${{ inputs.build_name }}-windows-x86_64

    # windows-latest/windows-2025 已于 2026-06 迁移到 windows-2025-vs2026 镜像
    # (https://github.com/actions/runner-images/issues/14017)，该镜像只装 Visual Studio 2026 (VS 18)。
    # Flutter 3.35.1 的 flutter_tools 只认识 VS 2019/2022，找不到 VS 时回退生成器
    # "Visual Studio 16 2019"，导致 flutter build windows 阶段 CMake 报
    # "could not find any instance of Visual Studio"。钉住 windows-2022（带 VS 2022）修复。
    # 上游 AppFlowy-Builder 能过是因为它已升级 Flutter 3.41.9（支持 VS 2026）。
    runs-on: windows-2022

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Download PonyNotes-Cloud-New (for client-api dependency)
        shell: bash
        run: |
          echo "Downloading PonyNotes-Cloud-New via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../PonyNotes-Cloud-New"
          curl -sL \
            -H "Authorization: token ${{ secrets.PRIVATE_REPO_TOKEN }}" \
            https://github.com/PonyNotes-IO/PonyNotes-Cloud-New/archive/refs/heads/main.tar.gz \
            -o /tmp/cloud.tar.gz
          tar -xzf /tmp/cloud.tar.gz -C /tmp --exclude='PonyNotes-Cloud-New-main/nginx.conf' --exclude='PonyNotes-Cloud-New-main/nginx' || true
          mv /tmp/PonyNotes-Cloud-New-main "$TARGET_DIR"
          rm /tmp/cloud.tar.gz
          echo "Downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/libs/client-api/"

      - name: Download AppFlowy-Collab (for collab dependencies)
        shell: bash
        run: |
          echo "Downloading AppFlowy-Collab (dev branch) via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../AppFlowy-Collab"
          curl -sL \
            -H "Authorization: token ${{ secrets.PRIVATE_REPO_TOKEN }}" \
            https://github.com/PonyNotes-IO/AppFlowy-Collab/archive/refs/heads/dev.tar.gz \
            -o /tmp/collab.tar.gz
          mkdir -p "$TARGET_DIR"
          tar -xzf /tmp/collab.tar.gz -C /tmp || true
          mv /tmp/AppFlowy-Collab-dev/* "$TARGET_DIR/"
          rm -rf /tmp/AppFlowy-Collab-dev
          rm /tmp/collab.tar.gz
          echo "AppFlowy-Collab downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/"

      - name: Download rust-rocksdb (for rocksdb dependency)
        shell: bash
        run: |
          echo "Cloning rust-rocksdb with submodules..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../rust-rocksdb"
          git clone https://github.com/rust-rocksdb/rust-rocksdb.git "$TARGET_DIR"
          cd "$TARGET_DIR"
          git checkout 1710120e4549e04ba3baa6a1ee5a5a801fa45a72
          git submodule update --init --recursive
          echo "rust-rocksdb cloned to: $TARGET_DIR"

      - name: Download langchain-rust (for langchain-rust dependency)
        shell: bash
        run: |
          echo "Downloading langchain-rust (af branch) via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../langchain-rust"
          curl -sL https://github.com/appflowy/langchain-rust/archive/refs/heads/af.tar.gz -o /tmp/langchain.tar.gz
          mkdir -p "$TARGET_DIR"
          tar -xzf /tmp/langchain.tar.gz -C /tmp || true
          mv /tmp/langchain-rust-af/* "$TARGET_DIR/"
          rm -rf /tmp/langchain-rust-af
          rm /tmp/langchain.tar.gz
          echo "langchain-rust downloaded to: $TARGET_DIR"

      - name: Patch Cargo.toml to use local paths for git dependencies
        shell: bash
        run: |
          echo "Patching Cargo.toml to use local paths instead of git URLs..."
          CARGO_TOML="${GITHUB_WORKSPACE}/frontend/rust-lib/Cargo.toml"
          cp "$CARGO_TOML" "$CARGO_TOML.bak"

          sed -i 's|collab = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab = { path = "../../../AppFlowy-Collab/collab" }|g' "$CARGO_TOML"
          sed -i 's|collab-entity = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-entity = { path = "../../../AppFlowy-Collab/collab-entity" }|g' "$CARGO_TOML"
          sed -i 's|collab-folder = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-folder = { path = "../../../AppFlowy-Collab/collab-folder" }|g' "$CARGO_TOML"
          sed -i 's|collab-document = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-document = { path = "../../../AppFlowy-Collab/collab-document" }|g' "$CARGO_TOML"
          sed -i 's|collab-database = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-database = { path = "../../../AppFlowy-Collab/collab-database" }|g' "$CARGO_TOML"
          sed -i 's|collab-plugins = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-plugins = { path = "../../../AppFlowy-Collab/collab-plugins" }|g' "$CARGO_TOML"
          sed -i 's|collab-user = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-user = { path = "../../../AppFlowy-Collab/collab-user" }|g' "$CARGO_TOML"
          sed -i 's|collab-importer = { version = "0.1", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-importer = { path = "../../../AppFlowy-Collab/collab-importer" }|g' "$CARGO_TOML"

          sed -i 's|rocksdb = { git = "https://github.com/rust-rocksdb/rust-rocksdb", rev = "1710120e4549e04ba3baa6a1ee5a5a801fa45a72" }|rocksdb = { path = "../../../rust-rocksdb" }|g' "$CARGO_TOML"
          sed -i 's|langchain-rust = { version = "4.6.0", git = "https://github.com/appflowy/langchain-rust", branch = "af" }|langchain-rust = { path = "../../../langchain-rust" }|g' "$CARGO_TOML"

          echo "Cargo.toml patched successfully"

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          target: x86_64-pc-windows-msvc
          override: true
          components: rustfmt
          profile: minimal

      - uses: davidB/rust-cargo-make@v1
        with:
          version: "0.37.5"

      - name: Install prerequisites
        working-directory: frontend
        run: |
          vcpkg integrate install
          cargo install duckscript_cli --force --locked
          cargo make appflowy-flutter-deps-tools

      - name: Generate env file
        working-directory: frontend/appflowy_flutter
        run: |
          echo "INTERNAL_BUILD=${{ inputs.internal_build }}" >> .env
          echo "APPFLOWY_CLOUD_URL=https://api.xiaomabiji.com" >> .env
          echo "AUTHENTICATOR_TYPE=3" >> .env
        shell: bash

      - name: Configure Git credentials for Cargo
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.ADMIN_GITHUB_TOKEN }}:x-oauth-basic@github.com" > ~/.git-credentials
          git config --global url."https://${{ secrets.ADMIN_GITHUB_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"


      - name: Build Windows app
        working-directory: frontend
        shell: bash
        run: |
          set -e
          flutter config --enable-windows-desktop
          dart ./scripts/flutter_release_build/build_flowy.dart exclude-directives . ${{ inputs.build_name }}
          # Build Rust core (dart_ffi.dll) and run code generation via cargo make
          cargo make --env APP_VERSION=${{ inputs.build_name }} --profile production-windows-x86 appflowy-core-release
          cargo make --env APP_VERSION=${{ inputs.build_name }} --profile production-windows-x86 code_generation

      - name: Build Flutter Windows app
        working-directory: frontend/appflowy_flutter
        shell: bash
        run: |
          set -o pipefail
          flutter pub get
          # 失败时把错误行和日志尾部写入 ::error:: 注解,便于通过匿名 Checks API 读取失败原因
          if ! flutter build windows --release --build-name=${{ inputs.build_name }} 2>&1 | tee /tmp/flutter_build.log; then
            grep -iE "error|exception|undefined|unresolved" /tmp/flutter_build.log | head -8 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            TAIL=$(tail -c 3000 /tmp/flutter_build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r//g;s/\n/%0A/g')
            echo "::error::BUILD-LOG-TAIL: ${TAIL}"
            exit 1
          fi

      - name: Copy build output and restore directives
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          # 不用 cargo make copy-to-product:其 Windows 实现是 duckscript glob_cp,
          # 递归拷贝海量 flutter_assets 时 cargo-make 栈溢出(exit -1073741571/0xC00000FD)。
          # 改用 bash cp -R,与 copy-to-product-macos 的 shell 实现同思路。
          PRODUCT_DIR="appflowy_flutter/product/${{ inputs.build_name }}/windows/PonyNotes"
          # 失败时把日志尾部写入 ::error:: 注解,便于匿名 Checks API 读取失败原因
          if ! {
            rm -rf "$PRODUCT_DIR" &&
            mkdir -p "$PRODUCT_DIR" &&
            cp -R appflowy_flutter/build/windows/x64/runner/Release/. "$PRODUCT_DIR/" &&
            dart ./scripts/flutter_release_build/build_flowy.dart include-directives . ${{ inputs.build_name }}
          } 2>&1 | tee /tmp/copy_step.log; then
            grep -iE "error|failed|not found|no such|assert|panic" /tmp/copy_step.log | head -8 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            TAIL=$(tail -c 3000 /tmp/copy_step.log | sed ':a;N;$!ba;s/%/%25/g;s/\r//g;s/\n/%0A/g')
            echo "::error::COPY-LOG-TAIL: ${TAIL}"
            exit 1
          fi

      - name: Verify build output
        shell: bash
        run: |
          {
            echo "=== Flutter build output ==="
            ls -la frontend/appflowy_flutter/build/windows/x64/runner/Release/ || echo "Flutter build output NOT FOUND"
            echo "=== Product output ==="
            ls -la "${{ env.WINDOWS_APP_RELEASE_PATH }}/PonyNotes/" || echo "Product output NOT FOUND"
            echo "=== Product directory ==="
            ls -la "${{ env.WINDOWS_APP_RELEASE_PATH }}/" || echo "Product directory NOT FOUND"
          } 2>&1 | tee /tmp/verify_step.log
          if [ ! -f "${{ env.WINDOWS_APP_RELEASE_PATH }}/PonyNotes/PonyNotes.exe" ]; then
            TAIL=$(tail -c 3000 /tmp/verify_step.log | sed ':a;N;$!ba;s/%/%25/g;s/\r//g;s/\n/%0A/g')
            echo "::error::PonyNotes.exe not found. VERIFY-LOG: ${TAIL}"
            exit 1
          fi

      - name: Archive Asset
        uses: vimtor/action-zip@v1
        with:
          files: ${{ env.WINDOWS_APP_RELEASE_PATH }}\
          dest: ${{ env.WINDOWS_APP_RELEASE_PATH }}\${{ env.WINDOWS_ZIP_NAME }}

      - name: Copy installer config & icon file
        working-directory: frontend
        run: |
          cp scripts/windows_installer/* ../${{ env.WINDOWS_APP_RELEASE_PATH }}

      # 上游 AppFlowy-Builder 同款步骤:runner 镜像预装的 Inno Setup 不在 PATH,
      # choco 安装后 iscc 才可直接调用
      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build installer executable
        working-directory: ${{ env.WINDOWS_APP_RELEASE_PATH }}
        shell: bash
        run: |
          set -o pipefail
          # MSYS_NO_PATHCONV=1:阻止 Git bash 把 /F、/D 开头的 iscc 参数当 POSIX 路径改写,
          # 否则 iscc 报 "You may not specify more than one script filename"
          if ! MSYS_NO_PATHCONV=1 iscc "/F${{ env.WINDOWS_INSTALLER_NAME }}" inno_setup_config.iss "/DAppVersion=${{ inputs.build_name }}" 2>&1 | tee /tmp/iscc.log; then
            TAIL=$(tail -c 3000 /tmp/iscc.log | sed ':a;N;$!ba;s/%/%25/g;s/\r//g;s/\n/%0A/g')
            echo "::error::ISCC-LOG-TAIL: ${TAIL}"
            exit 1
          fi

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.WINDOWS_INSTALLER_NAME }}.exe
          path: ${{ env.WINDOWS_APP_RELEASE_PATH }}\Output\${{ env.WINDOWS_INSTALLER_NAME }}.exe

      - name: Upload EXE to Release
        if: inputs.upload_url != ''
        shell: bash
        run: |
          filename="${{ env.WINDOWS_INSTALLER_NAME }}.exe"
          filepath="${{ env.WINDOWS_APP_RELEASE_PATH }}/Output/$filename"
          
          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)
          
          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')
          
          echo "Uploading $filename to release..."
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.WINDOWS_ZIP_NAME }}
          path: ${{ env.WINDOWS_APP_RELEASE_PATH }}/${{ env.WINDOWS_ZIP_NAME }}

      - name: Upload ZIP to Release
        if: inputs.upload_url != ''
        shell: bash
        run: |
          filename="${{ env.WINDOWS_ZIP_NAME }}"
          filepath="${{ env.WINDOWS_APP_RELEASE_PATH }}/$filename"
          
          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)
          
          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')
          
          echo "Uploading $filename to release..."
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

