          fi
          
          # 公证硬性要求：硬化运行时(--options runtime) + TSA 时间戳(--timestamp)。
          # 并带 codesign 兼容的 entitlements，避免 --force 重签抹掉网络权限。
          cat > /tmp/dmg_entitlements.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>com.apple.security.app-sandbox</key>
          	<false/>
          	<key>com.apple.security.network.client</key>
          	<true/>
          	<key>com.apple.security.network.server</key>
          	<true/>
          	<key>com.apple.security.files.user-selected.read-write</key>
          	<true/>
          	<key>com.apple.security.files.downloads.read-write</key>
          	<true/>
          </dict>
          </plist>
          PLIST
          /usr/bin/codesign --force --deep --timestamp --options runtime \
            --entitlements /tmp/dmg_entitlements.plist \
            --sign "${{ secrets.MACOS_CODESIGN_ID }}" \
            "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" -v
          codesign --verify --deep --strict --verbose=2 "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" || echo "⚠️ 签名验证警告，继续"
          echo "✅ Code signing completed"

      - name: Create macOS dmg
        run: |
          brew install create-dmg
          i=0
          until [[ -e "${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg" ]]; do
            create-dmg \
            --volname ${{ env.MACOS_DMG_NAME }} \
            --hide-extension "PonyNotes.app" \
            --window-size 600 450 \
            --icon-size 94 \
            --icon "PonyNotes.app" 141 249 \
            --app-drop-link 458 249 \
            "${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg" \
            "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" || true
            if [[ $i -eq 10 ]]; then
              echo 'Error: create-dmg did not succeed even after 10 tries.'
              exit 1
            fi
            i=$((i+1))
          done
          # 用 Developer ID + 时间戳对 DMG 本身签名（与本地流程一致）
          if [ -n "${{ secrets.MACOS_CERTIFICATE_BASE64 }}" ]; then
            /usr/bin/codesign --force --timestamp --sign "${{ secrets.MACOS_CODESIGN_ID }}" \
              "${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg" -v || echo "⚠️ DMG 签名失败，继续公证"
          fi

      - name: Check for Secret availability
        id: secret-check
        shell: bash
        run: |
          if [ "${{ secrets.MACOS_NOTARY_USER }}" == '' ]; then
            echo "available=false" >> $GITHUB_OUTPUT;
          elif [ "${{ secrets.MACOS_TEAM_ID }}" == '' ]; then
            echo "available=false" >> $GITHUB_OUTPUT;
          elif [ "${{ secrets.MACOS_NOTARY_PWD }}" == '' ]; then
            echo "available=false" >> $GITHUB_OUTPUT;
          else
            echo "available=true" >> $GITHUB_OUTPUT;
          fi

      - name: Notarize and staple PonyNotes
        if: ${{ steps.secret-check.outputs.available == 'true' }}
        # notarytool --wait 可能长时间等待 Apple 公证服务；加步骤超时避免空耗整个 job 时间。
        timeout-minutes: 30
        run: |
          DMG="${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg"
          echo "📤 提交公证（--wait，需数分钟）..."
          OUT=$(xcrun notarytool submit "$DMG" \
            --apple-id ${{ secrets.MACOS_NOTARY_USER }} \
            --team-id ${{ secrets.MACOS_TEAM_ID }} \
            --password ${{ secrets.MACOS_NOTARY_PWD }} \
            --wait 2>&1) || true
          echo "$OUT"
          if echo "$OUT" | grep -q "status: Accepted"; then
            echo "✅ 公证通过，开始 staple 装订票据..."
            xcrun stapler staple "$DMG"
            xcrun stapler validate "$DMG" && echo "✅ Staple 验证通过（离线安装不再报风险）"
          else
            echo "❌ 公证未通过（status 非 Accepted）。DMG 未装订，安装会报风险。"
            echo "   若为 status: Invalid，多因签名缺时间戳/未硬化；若为 403 协议错误，需在 developer.apple.com 接受协议。"
            SUBMIT_ID=$(echo "$OUT" | grep -m1 "id:" | awk '{print $2}')
            if [ -n "$SUBMIT_ID" ]; then
              echo "   查看详情：xcrun notarytool log $SUBMIT_ID --apple-id ... --team-id ... --password ..."
              xcrun notarytool log "$SUBMIT_ID" --apple-id ${{ secrets.MACOS_NOTARY_USER }} --team-id ${{ secrets.MACOS_TEAM_ID }} --password ${{ secrets.MACOS_NOTARY_PWD }} 2>&1 || true
            fi
            exit 1
          fi

      - name: Archive Asset
        working-directory: ${{ env.MACOS_APP_RELEASE_PATH }}
        run: zip --symlinks -qr ${{ env.MACOS_AARCH64_ZIP_NAME }} PonyNotes.app

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MACOS_AARCH64_ZIP_NAME }}
          path: ${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_AARCH64_ZIP_NAME }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MACOS_DMG_NAME }}.dmg
          path: ${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg

      - name: Upload ZIP to Release
        if: inputs.upload_url != ''
        run: |
          filename="${{ env.MACOS_AARCH64_ZIP_NAME }}"
          filepath="${{ env.MACOS_APP_RELEASE_PATH }}/$filename"
          
          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)
          
          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')
          
          echo "Uploading $filename to release..."
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

      - name: Upload DMG to Release
        if: inputs.upload_url != ''
        run: |
          filename="${{ env.MACOS_DMG_NAME }}.dmg"
          filepath="${{ env.MACOS_APP_RELEASE_PATH }}/$filename"
          
          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)
          
          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')
          
          echo "Uploading $filename to release..."
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body
