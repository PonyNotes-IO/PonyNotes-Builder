name: Build PonyNotes macOS

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repo"
        required: true
        default: "PonyNotes-IO/PonyNotes-New"
      branch:
        description: "Branch"
        required: true
        default: "dev_mobile"
      build_name:
        description: "Build Version (it should match the version in pubspec.yaml)"
        required: true
        default: "1.0.2"
      arch:
        type: choice
        description: "Build Architecture (默认 universal：单包通用于 Intel/Apple Silicon)"
        required: true
        default: universal
        options:
          - universal
          - All
          - x86_64
          - aarch64
      internal_build:
        type: choice
        description: "Internal Build Type (1 for internal, 0 for external)"
        required: true
        default: "1"
        options:
          - "0"
          - "1"
  workflow_call:
    inputs:
      repo:
        description: "Repo"
        required: true
        type: string
      branch:
        description: "Branch"
        required: true
        type: string
      build_name:
        description: "Build Version"
        required: true
        type: string
      arch:
        description: "Build Architecture"
        required: true
        type: string
      internal_build:
        description: "Internal Build Type"
        required: true
        type: string
      upload_url:
        description: "Upload URL for release assets"
        required: false
        type: string

env:
  FLUTTER_VERSION: "3.35.0"
  RUST_TOOLCHAIN: "1.91.0"
  RUST_BACKTRACE: "1"

jobs:
  x86_64:
    runs-on: macos-13
    # 防止任一步骤卡死后跑满 GitHub 上限（曾出现 #33 跑满 24 小时）。
    # 超时即快速失败并保留日志，便于定位真正卡住的步骤。
    timeout-minutes: 120

    if: ${{ inputs.arch == 'All' || inputs.arch == 'x86_64' }}

    env:
      MACOS_APP_RELEASE_PATH: frontend/appflowy_flutter/product/${{ inputs.build_name }}/macos/Release
      MACOS_X86_ZIP_NAME: PonyNotes-${{ inputs.build_name }}-macos-x86_64.zip
      MACOS_DMG_NAME: PonyNotes-${{ inputs.build_name }}-macos-x86_64

    steps:
      - name: Checkout source code
        uses: actions/checkout@v2
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Download PonyNotes-Cloud-New (for client-api dependency)
        run: |
          echo "📦 Downloading PonyNotes-Cloud-New via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../PonyNotes-Cloud-New"
          curl -sL https://github.com/PonyNotes-IO/PonyNotes-Cloud-New/archive/refs/heads/main.tar.gz -o /tmp/cloud.tar.gz
          tar -xzf /tmp/cloud.tar.gz -C /tmp 2>/dev/null || true
          rm -f /tmp/PonyNotes-Cloud-New-main/nginx.conf
          rm -rf /tmp/PonyNotes-Cloud-New-main/nginx
          mv /tmp/PonyNotes-Cloud-New-main "$TARGET_DIR"
          rm /tmp/cloud.tar.gz
          echo "✅ Downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/Cargo.toml"
          ls -la "$TARGET_DIR/libs/client-api/src/"

      - name: Download AppFlowy-Collab (for collab dependencies)
        run: |
          echo "📦 Downloading AppFlowy-Collab (dev branch) via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../AppFlowy-Collab"
          curl -sL https://github.com/PonyNotes-IO/AppFlowy-Collab/archive/refs/heads/dev.tar.gz -o /tmp/collab.tar.gz
          mkdir -p "$TARGET_DIR"
          tar -xzf /tmp/collab.tar.gz -C /tmp 2>/dev/null || true
          mv /tmp/AppFlowy-Collab-dev/* "$TARGET_DIR/"
          rm -rf /tmp/AppFlowy-Collab-dev
          rm /tmp/collab.tar.gz
          echo "✅ AppFlowy-Collab downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/"

      - name: Download rust-rocksdb (for rocksdb dependency)
        run: |
          echo "📦 Cloning rust-rocksdb with submodules (required for rocksdb source)..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../rust-rocksdb"
          # Must use git clone to get submodules (rocksdb and snappy source code)
          # tarball download doesn't work because librocksdb-sys build.rs requires git submodules
          git clone https://github.com/rust-rocksdb/rust-rocksdb.git "$TARGET_DIR"
          cd "$TARGET_DIR"
          git checkout 1710120e4549e04ba3baa6a1ee5a5a801fa45a72
          # 用 --depth 1 浅克隆子模块：rocksdb 的 C++ 源码子模块很大，
          # 完整递归拉取在 CI 上极易卡死（疑似 #33 跑满 24 小时的主因之一）。
          # 浅克隆只取所需快照，大幅缩短时间且不影响 librocksdb-sys 编译。
          git submodule update --init --recursive --depth 1
          echo "✅ rust-rocksdb cloned to: $TARGET_DIR"
          ls -la "$TARGET_DIR/"
          echo "📋 Checking submodules:"
          ls -la "$TARGET_DIR/librocksdb-sys/"

      - name: Download langchain-rust (for langchain-rust dependency)
        run: |
          echo "📦 Downloading langchain-rust (af branch) via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../langchain-rust"
          curl -sL https://github.com/appflowy/langchain-rust/archive/refs/heads/af.tar.gz -o /tmp/langchain.tar.gz
          mkdir -p "$TARGET_DIR"
          tar -xzf /tmp/langchain.tar.gz -C /tmp 2>/dev/null || true
          mv /tmp/langchain-rust-af/* "$TARGET_DIR/"
          rm -rf /tmp/langchain-rust-af
          rm /tmp/langchain.tar.gz
          echo "✅ langchain-rust downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/"

      - name: Patch Cargo.toml to use local paths for git dependencies
        run: |
          echo "🔧 Patching Cargo.toml to use local paths instead of git URLs..."
          CARGO_TOML="${GITHUB_WORKSPACE}/frontend/rust-lib/Cargo.toml"
          
          # Backup original
          cp "$CARGO_TOML" "$CARGO_TOML.bak"
          
          # Replace git dependencies with local paths for collab crates
          sed -i '' 's|collab = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab = { path = "../../../AppFlowy-Collab/collab" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-entity = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-entity = { path = "../../../AppFlowy-Collab/collab-entity" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-folder = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-folder = { path = "../../../AppFlowy-Collab/collab-folder" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-document = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-document = { path = "../../../AppFlowy-Collab/collab-document" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-database = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-database = { path = "../../../AppFlowy-Collab/collab-database" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-plugins = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-plugins = { path = "../../../AppFlowy-Collab/collab-plugins" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-user = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-user = { path = "../../../AppFlowy-Collab/collab-user" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-importer = { version = "0.1", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-importer = { path = "../../../AppFlowy-Collab/collab-importer" }|g' "$CARGO_TOML"
          
          # Replace rocksdb git dependency with local path
          sed -i '' 's|rocksdb = { git = "https://github.com/rust-rocksdb/rust-rocksdb", rev = "1710120e4549e04ba3baa6a1ee5a5a801fa45a72" }|rocksdb = { path = "../../../rust-rocksdb" }|g' "$CARGO_TOML"
          
          # Replace langchain-rust git dependency with local path
          sed -i '' 's|langchain-rust = { version = "4.6.0", git = "https://github.com/appflowy/langchain-rust", branch = "af" }|langchain-rust = { path = "../../../langchain-rust" }|g' "$CARGO_TOML"
          
          echo "✅ Cargo.toml patched successfully"
          echo "📋 Showing [patch.crates-io] section:"
          grep -A 35 '\[patch.crates-io\]' "$CARGO_TOML" | head -45

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          target: x86_64-apple-darwin
          override: true
          components: rustfmt
          profile: minimal

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-x86_64
          workspaces: |
            frontend/rust-lib

      - uses: davidB/rust-cargo-make@v1
        with:
          version: "0.37.5"

      - name: Install prerequisites
        working-directory: frontend
        run: |
          cargo install duckscript_cli --force --locked
          cargo make appflowy-flutter-deps-tools

      - name: Generate env file
        working-directory: frontend/appflowy_flutter
        run: |
          echo "INTERNAL_BUILD=${{ inputs.internal_build }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
          echo "APPFLOWY_CLOUD_URL=https://api.xiaomabiji.com" >> .env
          echo "AUTHENTICATOR_TYPE=3" >> .env
        shell: bash

      - name: Configure Git credentials for Cargo
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.ADMIN_GITHUB_TOKEN }}:x-oauth-basic@github.com" > ~/.git-credentials


      - name: Build PonyNotes (x86_64)
        working-directory: frontend
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CARGO_NET_RETRY: "10"
          CARGO_HTTP_TIMEOUT: "120"
          GIT_TERMINAL_PROMPT: "0"
        run: |
          echo "🔧 Building PonyNotes for x86_64 (Intel)"
          echo "Architecture: $(uname -m)"
          echo "Rust targets: $(rustup target list --installed)"
          
          flutter config --enable-macos-desktop
          dart ./scripts/flutter_release_build/build_flowy.dart run . ${{ inputs.build_name }}
          
          echo "✅ x86_64 build completed"
          ls -la appflowy_flutter/product/${{ inputs.build_name }}/macos/Release/

      - name: Debug Certificate (Optional)
        if: ${{ always() }}
        run: |
          if [ -z "${{ secrets.MACOS_CERTIFICATE_BASE64 }}" ]; then
            echo "⚠️ MACOS_CERTIFICATE_BASE64 not set, skipping debug"
            exit 0
          fi
          
          echo "🔍 Debugging certificate..."
          chmod +x debug_certificate.sh
          export MACOS_CERTIFICATE_BASE64="${{ secrets.MACOS_CERTIFICATE_BASE64 }}"
          export P12_PASSWORD="${{ secrets.P12_PASSWORD }}"
          ./debug_certificate.sh

      - name: Codesign PonyNotes
        run: |
          if [ -z "${{ secrets.MACOS_CERTIFICATE_BASE64 }}" ]; then
            echo "⚠️ Skipping code signing - MACOS_CERTIFICATE not set"
            exit 0
          fi
          
          echo "✍️ Code signing PonyNotes app..."
          echo ${{ secrets.MACOS_CERTIFICATE_BASE64 }} | base64 --decode > certificate.p12
          security create-keychain -p action build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p action build.keychain
          security import certificate.p12 -k build.keychain -P ${{ secrets.P12_PASSWORD }} -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k action build.keychain
          
          # Verify the app exists before signing
          if [ ! -d "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" ]; then
            echo "❌ PonyNotes.app not found at ${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app"
            exit 1
          fi
          
          # 公证硬性要求：硬化运行时(--options runtime) + TSA 时间戳(--timestamp)。
          # 并带 codesign 兼容的 entitlements，避免 --force 重签抹掉网络权限。
          cat > /tmp/dmg_entitlements.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>com.apple.security.app-sandbox</key>
          	<false/>
          	<key>com.apple.security.network.client</key>
          	<true/>
          	<key>com.apple.security.network.server</key>
          	<true/>
          	<key>com.apple.security.files.user-selected.read-write</key>
          	<true/>
          	<key>com.apple.security.files.downloads.read-write</key>
          	<true/>
          </dict>
          </plist>
          PLIST
          /usr/bin/codesign --force --deep --timestamp --options runtime \
            --entitlements /tmp/dmg_entitlements.plist \
            --sign "${{ secrets.MACOS_CODESIGN_ID }}" \
            "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" -v
          codesign --verify --deep --strict --verbose=2 "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" || echo "⚠️ 签名验证警告，继续"
          echo "✅ Code signing completed"

      - name: Create macOS dmg
        run: |
          brew install create-dmg
          i=0
          until [[ -e "${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg" ]]; do
            create-dmg \
            --volname ${{ env.MACOS_DMG_NAME }} \
            --hide-extension "PonyNotes.app" \
            --window-size 600 450 \
            --icon-size 94 \
            --icon "PonyNotes.app" 141 249 \
            --app-drop-link 458 249 \
            "${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg" \
            "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" || true
            if [[ $i -eq 10 ]]; then
              echo 'Error: create-dmg did not succeed even after 10 tries.'
              exit 1
            fi
            i=$((i+1))
          done
          # 用 Developer ID + 时间戳对 DMG 本身签名（与本地流程一致）
          if [ -n "${{ secrets.MACOS_CERTIFICATE_BASE64 }}" ]; then
            /usr/bin/codesign --force --timestamp --sign "${{ secrets.MACOS_CODESIGN_ID }}" \
              "${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg" -v || echo "⚠️ DMG 签名失败，继续公证"
          fi

      - name: Notarize and staple PonyNotes
        # notarytool --wait 可能长时间等待 Apple 公证服务；加步骤超时避免空耗整个 job 时间。
        timeout-minutes: 30
        run: |
          if [ -z "${{ secrets.MACOS_NOTARY_USER }}" ] || [ -z "${{ secrets.MACOS_NOTARY_PWD }}" ] || [ -z "${{ secrets.MACOS_TEAM_ID }}" ]; then
            echo "⚠️ 公证 secrets 未配置，跳过公证（DMG 未装订，安装会报风险）"
            exit 0
          fi
          DMG="${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg"
          echo "📤 提交公证（--wait，需数分钟）..."
          OUT=$(xcrun notarytool submit "$DMG" \
            --apple-id ${{ secrets.MACOS_NOTARY_USER }} \
            --team-id ${{ secrets.MACOS_TEAM_ID }} \
            --password ${{ secrets.MACOS_NOTARY_PWD }} \
            --wait 2>&1) || true
          echo "$OUT"
          if echo "$OUT" | grep -q "status: Accepted"; then
            echo "✅ 公证通过，开始 staple 装订票据..."
            xcrun stapler staple "$DMG"
            xcrun stapler validate "$DMG" && echo "✅ Staple 验证通过（离线安装不再报风险）"
          else
            echo "❌ 公证未通过（status 非 Accepted）。DMG 未装订，安装会报风险。"
            SUBMIT_ID=$(echo "$OUT" | grep -m1 "id:" | awk '{print $2}')
            if [ -n "$SUBMIT_ID" ]; then
              xcrun notarytool log "$SUBMIT_ID" --apple-id ${{ secrets.MACOS_NOTARY_USER }} --team-id ${{ secrets.MACOS_TEAM_ID }} --password ${{ secrets.MACOS_NOTARY_PWD }} 2>&1 || true
            fi
            exit 1
          fi

      - name: Archive Asset
        working-directory: ${{ env.MACOS_APP_RELEASE_PATH }}
        run: zip --symlinks -qr ${{ env.MACOS_X86_ZIP_NAME }} PonyNotes.app

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MACOS_X86_ZIP_NAME }}
          path: ${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_X86_ZIP_NAME }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MACOS_DMG_NAME }}.dmg
          path: ${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg

      - name: Upload ZIP to Release
        if: inputs.upload_url != ''
        run: |
          filename="${{ env.MACOS_X86_ZIP_NAME }}"
          filepath="${{ env.MACOS_APP_RELEASE_PATH }}/$filename"
          
          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)
          
          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')
          
          echo "Uploading $filename to release..."
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

      - name: Upload DMG to Release
        if: inputs.upload_url != ''
        run: |
          filename="${{ env.MACOS_DMG_NAME }}.dmg"
          filepath="${{ env.MACOS_APP_RELEASE_PATH }}/$filename"
          
          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)
          
          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')
          
          echo "Uploading $filename to release..."
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

  aarch64:
    runs-on: macos-latest
    # 防止任一步骤卡死后跑满 GitHub 上限；超时即快速失败并保留日志。
    timeout-minutes: 120

    if: ${{ inputs.arch == 'All' || inputs.arch == 'aarch64' }}

    env:
      MACOS_APP_RELEASE_PATH: frontend/appflowy_flutter/product/${{ inputs.build_name }}/macos/Release
      MACOS_AARCH64_ZIP_NAME: PonyNotes-${{ inputs.build_name }}-macos-aarch64.zip
      MACOS_DMG_NAME: PonyNotes-${{ inputs.build_name }}-macos-aarch64

    steps:
      - name: Checkout source code
        uses: actions/checkout@v2
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Download PonyNotes-Cloud-New (for client-api dependency)
        run: |
          echo "📦 Downloading PonyNotes-Cloud-New via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../PonyNotes-Cloud-New"
          curl -sL https://github.com/PonyNotes-IO/PonyNotes-Cloud-New/archive/refs/heads/main.tar.gz -o /tmp/cloud.tar.gz
          tar -xzf /tmp/cloud.tar.gz -C /tmp 2>/dev/null || true
          rm -f /tmp/PonyNotes-Cloud-New-main/nginx.conf
          rm -rf /tmp/PonyNotes-Cloud-New-main/nginx
          mv /tmp/PonyNotes-Cloud-New-main "$TARGET_DIR"
          rm /tmp/cloud.tar.gz
          echo "✅ Downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/Cargo.toml"
          ls -la "$TARGET_DIR/libs/client-api/src/"

      - name: Download AppFlowy-Collab (for collab dependencies)
        run: |
          echo "📦 Downloading AppFlowy-Collab (dev branch) via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../AppFlowy-Collab"
          curl -sL https://github.com/PonyNotes-IO/AppFlowy-Collab/archive/refs/heads/dev.tar.gz -o /tmp/collab.tar.gz
          mkdir -p "$TARGET_DIR"
          tar -xzf /tmp/collab.tar.gz -C /tmp 2>/dev/null || true
          mv /tmp/AppFlowy-Collab-dev/* "$TARGET_DIR/"
          rm -rf /tmp/AppFlowy-Collab-dev
          rm /tmp/collab.tar.gz
          echo "✅ AppFlowy-Collab downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/"

      - name: Download rust-rocksdb (for rocksdb dependency)
        run: |
          echo "📦 Cloning rust-rocksdb with submodules (required for rocksdb source)..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../rust-rocksdb"
          # Must use git clone to get submodules (rocksdb and snappy source code)
          # tarball download doesn't work because librocksdb-sys build.rs requires git submodules
          git clone https://github.com/rust-rocksdb/rust-rocksdb.git "$TARGET_DIR"
          cd "$TARGET_DIR"
          git checkout 1710120e4549e04ba3baa6a1ee5a5a801fa45a72
          # 用 --depth 1 浅克隆子模块：rocksdb 的 C++ 源码子模块很大，
          # 完整递归拉取在 CI 上极易卡死（疑似 #33 跑满 24 小时的主因之一）。
          # 浅克隆只取所需快照，大幅缩短时间且不影响 librocksdb-sys 编译。
          git submodule update --init --recursive --depth 1
          echo "✅ rust-rocksdb cloned to: $TARGET_DIR"
          ls -la "$TARGET_DIR/"
          echo "📋 Checking submodules:"
          ls -la "$TARGET_DIR/librocksdb-sys/"

      - name: Download langchain-rust (for langchain-rust dependency)
        run: |
          echo "📦 Downloading langchain-rust (af branch) via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../langchain-rust"
          curl -sL https://github.com/appflowy/langchain-rust/archive/refs/heads/af.tar.gz -o /tmp/langchain.tar.gz
          mkdir -p "$TARGET_DIR"
          tar -xzf /tmp/langchain.tar.gz -C /tmp 2>/dev/null || true
          mv /tmp/langchain-rust-af/* "$TARGET_DIR/"
          rm -rf /tmp/langchain-rust-af
          rm /tmp/langchain.tar.gz
          echo "✅ langchain-rust downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/"

      - name: Patch Cargo.toml to use local paths for git dependencies
        run: |
          echo "🔧 Patching Cargo.toml to use local paths instead of git URLs..."
          CARGO_TOML="${GITHUB_WORKSPACE}/frontend/rust-lib/Cargo.toml"
          
          # Backup original
          cp "$CARGO_TOML" "$CARGO_TOML.bak"
          
          # Replace git dependencies with local paths for collab crates
          sed -i '' 's|collab = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab = { path = "../../../AppFlowy-Collab/collab" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-entity = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-entity = { path = "../../../AppFlowy-Collab/collab-entity" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-folder = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-folder = { path = "../../../AppFlowy-Collab/collab-folder" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-document = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-document = { path = "../../../AppFlowy-Collab/collab-document" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-database = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-database = { path = "../../../AppFlowy-Collab/collab-database" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-plugins = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-plugins = { path = "../../../AppFlowy-Collab/collab-plugins" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-user = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-user = { path = "../../../AppFlowy-Collab/collab-user" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-importer = { version = "0.1", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-importer = { path = "../../../AppFlowy-Collab/collab-importer" }|g' "$CARGO_TOML"
          
          # Replace rocksdb git dependency with local path
          sed -i '' 's|rocksdb = { git = "https://github.com/rust-rocksdb/rust-rocksdb", rev = "1710120e4549e04ba3baa6a1ee5a5a801fa45a72" }|rocksdb = { path = "../../../rust-rocksdb" }|g' "$CARGO_TOML"
          
          # Replace langchain-rust git dependency with local path
          sed -i '' 's|langchain-rust = { version = "4.6.0", git = "https://github.com/appflowy/langchain-rust", branch = "af" }|langchain-rust = { path = "../../../langchain-rust" }|g' "$CARGO_TOML"
          
          echo "✅ Cargo.toml patched successfully"
          echo "📋 Showing [patch.crates-io] section:"
          grep -A 35 '\[patch.crates-io\]' "$CARGO_TOML" | head -45

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          target: aarch64-apple-darwin
          override: true
          components: rustfmt
          profile: minimal

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-aarch64
          workspaces: |
            frontend/rust-lib

      - uses: davidB/rust-cargo-make@v1
        with:
          version: "0.37.5"

      - name: Install prerequisites
        working-directory: frontend
        run: |
          cargo install duckscript_cli --force --locked
          cargo make appflowy-flutter-deps-tools

      - name: Generate env file
        working-directory: frontend/appflowy_flutter
        run: |
          echo "INTERNAL_BUILD=${{ inputs.internal_build }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
          echo "APPFLOWY_CLOUD_URL=https://api.xiaomabiji.com" >> .env
          echo "AUTHENTICATOR_TYPE=3" >> .env
        shell: bash

      - name: Configure Git credentials for Cargo
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.ADMIN_GITHUB_TOKEN }}:x-oauth-basic@github.com" > ~/.git-credentials

      - name: Build PonyNotes (aarch64)
        working-directory: frontend
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CARGO_NET_RETRY: "10"
          CARGO_HTTP_TIMEOUT: "120"
          GIT_TERMINAL_PROMPT: "0"
        run: |
          echo "🔧 Building PonyNotes for aarch64 (ARM64)"
          echo "Architecture: $(uname -m)"
          echo "Rust targets: $(rustup target list --installed)"
          
          flutter config --enable-macos-desktop
          dart ./scripts/flutter_release_build/build_flowy.dart run . ${{ inputs.build_name }}
          
          echo "✅ aarch64 build completed"
          ls -la appflowy_flutter/product/${{ inputs.build_name }}/macos/Release/

      - name: Codesign PonyNotes
        run: |
          # 修正：此处原误用 secrets.MACOS_CERTIFICATE（不存在/为空），
          # 与 x86_64、universal 两个 job 不一致，导致 aarch64 签名被静默跳过。
          # 统一改为 MACOS_CERTIFICATE_BASE64。
          if [ -z "${{ secrets.MACOS_CERTIFICATE_BASE64 }}" ]; then
            echo "⚠️ Skipping code signing - MACOS_CERTIFICATE_BASE64 not set"
            exit 0
          fi

          echo "✍️ Code signing PonyNotes app..."
          echo ${{ secrets.MACOS_CERTIFICATE_BASE64 }} | base64 --decode > certificate.p12
          security create-keychain -p action build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p action build.keychain
          security import certificate.p12 -k build.keychain -P ${{ secrets.P12_PASSWORD }} -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k action build.keychain
          
          # Verify the app exists before signing
          if [ ! -d "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" ]; then
            echo "❌ PonyNotes.app not found at ${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app"
            exit 1
          fi
          
          # 公证硬性要求：硬化运行时(--options runtime) + TSA 时间戳(--timestamp)。
          # 并带 codesign 兼容的 entitlements，避免 --force 重签抹掉网络权限。
          cat > /tmp/dmg_entitlements.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>com.apple.security.app-sandbox</key>
          	<false/>
          	<key>com.apple.security.network.client</key>
          	<true/>
          	<key>com.apple.security.network.server</key>
          	<true/>
          	<key>com.apple.security.files.user-selected.read-write</key>
          	<true/>
          	<key>com.apple.security.files.downloads.read-write</key>
          	<true/>
          </dict>
          </plist>
          PLIST
          /usr/bin/codesign --force --deep --timestamp --options runtime \
            --entitlements /tmp/dmg_entitlements.plist \
            --sign "${{ secrets.MACOS_CODESIGN_ID }}" \
            "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" -v
          codesign --verify --deep --strict --verbose=2 "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" || echo "⚠️ 签名验证警告，继续"
          echo "✅ Code signing completed"

      - name: Create macOS dmg
        run: |
          brew install create-dmg
          i=0
          until [[ -e "${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg" ]]; do
            create-dmg \
            --volname ${{ env.MACOS_DMG_NAME }} \
            --hide-extension "PonyNotes.app" \
            --window-size 600 450 \
            --icon-size 94 \
            --icon "PonyNotes.app" 141 249 \
            --app-drop-link 458 249 \
            "${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg" \
            "${{ env.MACOS_APP_RELEASE_PATH }}/PonyNotes.app" || true
            if [[ $i -eq 10 ]]; then
              echo 'Error: create-dmg did not succeed even after 10 tries.'
              exit 1
            fi
            i=$((i+1))
          done
          # 用 Developer ID + 时间戳对 DMG 本身签名（与本地流程一致）
          if [ -n "${{ secrets.MACOS_CERTIFICATE_BASE64 }}" ]; then
            /usr/bin/codesign --force --timestamp --sign "${{ secrets.MACOS_CODESIGN_ID }}" \
              "${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg" -v || echo "⚠️ DMG 签名失败，继续公证"
          fi

      - name: Notarize and staple PonyNotes
        # notarytool --wait 可能长时间等待 Apple 公证服务；加步骤超时避免空耗整个 job 时间。
        timeout-minutes: 30
        run: |
          if [ -z "${{ secrets.MACOS_NOTARY_USER }}" ] || [ -z "${{ secrets.MACOS_NOTARY_PWD }}" ] || [ -z "${{ secrets.MACOS_TEAM_ID }}" ]; then
            echo "⚠️ 公证 secrets 未配置，跳过公证（DMG 未装订，安装会报风险）"
            exit 0
          fi
          DMG="${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg"
          echo "📤 提交公证（--wait，需数分钟）..."
          OUT=$(xcrun notarytool submit "$DMG" \
            --apple-id ${{ secrets.MACOS_NOTARY_USER }} \
            --team-id ${{ secrets.MACOS_TEAM_ID }} \
            --password ${{ secrets.MACOS_NOTARY_PWD }} \
            --wait 2>&1) || true
          echo "$OUT"
          if echo "$OUT" | grep -q "status: Accepted"; then
            echo "✅ 公证通过，开始 staple 装订票据..."
            xcrun stapler staple "$DMG"
            xcrun stapler validate "$DMG" && echo "✅ Staple 验证通过（离线安装不再报风险）"
          else
            echo "❌ 公证未通过（status 非 Accepted）。DMG 未装订，安装会报风险。"
            SUBMIT_ID=$(echo "$OUT" | grep -m1 "id:" | awk '{print $2}')
            if [ -n "$SUBMIT_ID" ]; then
              xcrun notarytool log "$SUBMIT_ID" --apple-id ${{ secrets.MACOS_NOTARY_USER }} --team-id ${{ secrets.MACOS_TEAM_ID }} --password ${{ secrets.MACOS_NOTARY_PWD }} 2>&1 || true
            fi
            exit 1
          fi

      - name: Archive Asset
        working-directory: ${{ env.MACOS_APP_RELEASE_PATH }}
        run: zip --symlinks -qr ${{ env.MACOS_AARCH64_ZIP_NAME }} PonyNotes.app

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MACOS_AARCH64_ZIP_NAME }}
          path: ${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_AARCH64_ZIP_NAME }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: ${{ env.MACOS_DMG_NAME }}.dmg
          path: ${{ env.MACOS_APP_RELEASE_PATH }}/${{ env.MACOS_DMG_NAME }}.dmg

      - name: Upload ZIP to Release
        if: inputs.upload_url != ''
        run: |
          filename="${{ env.MACOS_AARCH64_ZIP_NAME }}"
          filepath="${{ env.MACOS_APP_RELEASE_PATH }}/$filename"
          
          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)
          
          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')
          
          echo "Uploading $filename to release..."
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

      - name: Upload DMG to Release
        if: inputs.upload_url != ''
        run: |
          filename="${{ env.MACOS_DMG_NAME }}.dmg"
          filepath="${{ env.MACOS_APP_RELEASE_PATH }}/$filename"
          
          # URL encode the filename
          encoded_filename=$(echo -n "$filename" | jq -sRr @uri)
          
          # Remove the {?name,label} template from upload URL if present
          upload_url=$(echo "${{ inputs.upload_url }}" | sed 's/{[^}]*}//g')
          
          echo "Uploading $filename to release..."
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$filepath" \
            "${upload_url}?name=${encoded_filename}" \
            --fail-with-body

  universal:
    runs-on: macos-latest
    # universal 需编译 x86_64+arm64 两架构再合并，给足时间；超时即快速失败。
    timeout-minutes: 150

    if: ${{ inputs.arch == 'All' || inputs.arch == 'universal' }}

    env:
      MACOS_APP_RELEASE_PATH: frontend/appflowy_flutter/product/${{ inputs.build_name }}/macos/Release
      MACOS_AARCH64_ZIP_NAME: PonyNotes-${{ inputs.build_name }}-macos-universal.zip
      MACOS_DMG_NAME: PonyNotes-${{ inputs.build_name }}-macos-universal

    steps:
      - name: Checkout source code
        uses: actions/checkout@v2
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Download PonyNotes-Cloud-New (for client-api dependency)
        run: |
          echo "📦 Downloading PonyNotes-Cloud-New via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../PonyNotes-Cloud-New"
          curl -sL https://github.com/PonyNotes-IO/PonyNotes-Cloud-New/archive/refs/heads/main.tar.gz -o /tmp/cloud.tar.gz
          tar -xzf /tmp/cloud.tar.gz -C /tmp 2>/dev/null || true
          rm -f /tmp/PonyNotes-Cloud-New-main/nginx.conf
          rm -rf /tmp/PonyNotes-Cloud-New-main/nginx
          mv /tmp/PonyNotes-Cloud-New-main "$TARGET_DIR"
          rm /tmp/cloud.tar.gz
          echo "✅ Downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/Cargo.toml"
          ls -la "$TARGET_DIR/libs/client-api/src/"

      - name: Download AppFlowy-Collab (for collab dependencies)
        run: |
          echo "📦 Downloading AppFlowy-Collab (dev branch) via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../AppFlowy-Collab"
          curl -sL https://github.com/PonyNotes-IO/AppFlowy-Collab/archive/refs/heads/dev.tar.gz -o /tmp/collab.tar.gz
          mkdir -p "$TARGET_DIR"
          tar -xzf /tmp/collab.tar.gz -C /tmp 2>/dev/null || true
          mv /tmp/AppFlowy-Collab-dev/* "$TARGET_DIR/"
          rm -rf /tmp/AppFlowy-Collab-dev
          rm /tmp/collab.tar.gz
          echo "✅ AppFlowy-Collab downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/"

      - name: Download rust-rocksdb (for rocksdb dependency)
        run: |
          echo "📦 Cloning rust-rocksdb with submodules (required for rocksdb source)..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../rust-rocksdb"
          # Must use git clone to get submodules (rocksdb and snappy source code)
          # tarball download doesn't work because librocksdb-sys build.rs requires git submodules
          git clone https://github.com/rust-rocksdb/rust-rocksdb.git "$TARGET_DIR"
          cd "$TARGET_DIR"
          git checkout 1710120e4549e04ba3baa6a1ee5a5a801fa45a72
          # 用 --depth 1 浅克隆子模块：rocksdb 的 C++ 源码子模块很大，
          # 完整递归拉取在 CI 上极易卡死（疑似 #33 跑满 24 小时的主因之一）。
          # 浅克隆只取所需快照，大幅缩短时间且不影响 librocksdb-sys 编译。
          git submodule update --init --recursive --depth 1
          echo "✅ rust-rocksdb cloned to: $TARGET_DIR"
          ls -la "$TARGET_DIR/"
          echo "📋 Checking submodules:"
          ls -la "$TARGET_DIR/librocksdb-sys/"

      - name: Download langchain-rust (for langchain-rust dependency)
        run: |
          echo "📦 Downloading langchain-rust (af branch) via tarball..."
          TARGET_DIR="${GITHUB_WORKSPACE}/../langchain-rust"
          curl -sL https://github.com/appflowy/langchain-rust/archive/refs/heads/af.tar.gz -o /tmp/langchain.tar.gz
          mkdir -p "$TARGET_DIR"
          tar -xzf /tmp/langchain.tar.gz -C /tmp 2>/dev/null || true
          mv /tmp/langchain-rust-af/* "$TARGET_DIR/"
          rm -rf /tmp/langchain-rust-af
          rm /tmp/langchain.tar.gz
          echo "✅ langchain-rust downloaded to: $TARGET_DIR"
          ls -la "$TARGET_DIR/"

      - name: Patch Cargo.toml to use local paths for git dependencies
        run: |
          echo "🔧 Patching Cargo.toml to use local paths instead of git URLs..."
          CARGO_TOML="${GITHUB_WORKSPACE}/frontend/rust-lib/Cargo.toml"
          
          # Backup original
          cp "$CARGO_TOML" "$CARGO_TOML.bak"
          
          # Replace git dependencies with local paths for collab crates
          sed -i '' 's|collab = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab = { path = "../../../AppFlowy-Collab/collab" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-entity = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-entity = { path = "../../../AppFlowy-Collab/collab-entity" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-folder = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-folder = { path = "../../../AppFlowy-Collab/collab-folder" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-document = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-document = { path = "../../../AppFlowy-Collab/collab-document" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-database = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-database = { path = "../../../AppFlowy-Collab/collab-database" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-plugins = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-plugins = { path = "../../../AppFlowy-Collab/collab-plugins" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-user = { version = "0.2", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-user = { path = "../../../AppFlowy-Collab/collab-user" }|g' "$CARGO_TOML"
          sed -i '' 's|collab-importer = { version = "0.1", git = "https://github.com/PonyNotes-IO/AppFlowy-Collab", branch = "dev" }|collab-importer = { path = "../../../AppFlowy-Collab/collab-importer" }|g' "$CARGO_TOML"
          
          # Replace rocksdb git dependency with local path
          sed -i '' 's|rocksdb = { git = "https://github.com/rust-rocksdb/rust-rocksdb", rev = "1710120e4549e04ba3baa6a1ee5a5a801fa45a72" }|rocksdb = { path = "../../../rust-rocksdb" }|g' "$CARGO_TOML"
          
          # Replace langchain-rust git dependency with local path
          sed -i '' 's|langchain-rust = { version = "4.6.0", git = "https://github.com/appflowy/langchain-rust", branch = "af" }|langchain-rust = { path = "../../../langchain-rust" }|g' "$CARGO_TOML"
          
          echo "✅ Cargo.toml patched successfully"
          echo "📋 Showing [patch.crates-io] section:"
